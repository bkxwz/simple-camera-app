name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Extract version name
      id: version
      run: |
        VERSION_NAME=$(grep -oP 'versionName "\K[^"]+' app/build.gradle)
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        VERSION_CODE=$(grep -oP 'versionCode \K\d+' app/build.gradle)
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
    
    - name: Build with Gradle
      run: ./gradlew assembleDebug
    
    - name: Upload Artifact
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: SimpleCamera-debug-v${{ steps.version.outputs.version_name }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
    
    - name: Create Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        name: SimpleCamera v${{ steps.version.outputs.version_name }}
        tag_name: ${{ github.ref_name }}
        files: app/build/outputs/apk/debug/app-debug.apk
        generate_release_notes: true
